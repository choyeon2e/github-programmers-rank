name: github-programmers-rank

permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - run: npm install
    - run: npm run build

    - name: Run ranking script
      env:
        PROGRAMMERS_TOKEN_ID: ${{ secrets.PROGRAMMERS_TOKEN_ID }}
        PROGRAMMERS_TOKEN_PW: ${{ secrets.PROGRAMMERS_TOKEN_PW }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        echo "PROGRAMMERS_TOKEN_ID=$PROGRAMMERS_TOKEN_ID" > .env
        echo "PROGRAMMERS_TOKEN_PW=$PROGRAMMERS_TOKEN_PW" >> .env
        
        npm run start
        
        git add -A
        git commit -m "update: Programmers rank" || echo "No changes to commit"
        git push origin master
